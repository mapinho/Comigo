<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin mapinho@vectorpg.com.br
    ServerName comigo.vectorconsulting.com.br

    <Proxy *>
        Require all granted
    </Proxy>

    ProxyPreserveHost On

    # Redirecionamento para o MCP Server (via SSE)
    ProxyPass /mcp/ http://127.0.0.1:8000/
    ProxyPassReverse /mcp/ http://127.0.0.1:8000/

    ProxyPass /_stcore/stream ws://127.0.0.1:8501/_stcore/stream
    ProxyPassReverse /_stcore/stream ws://127.0.0.1:8501/_stcore/stream

    ProxyPass / http://127.0.0.1:8501/
    ProxyPassReverse / http://127.0.0.1:8501/
    
    ErrorLog ${APACHE_LOG_DIR}/comigo-error.log
    CustomLog ${APACHE_LOG_DIR}/comigo-access.log combined

SSLCertificateFile /etc/letsencrypt/live/comigo.vectorconsulting.com.br/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/comigo.vectorconsulting.com.br/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
