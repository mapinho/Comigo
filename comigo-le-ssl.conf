<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin mapinho@vectorpg.com.br
    ServerName comigo.vectorconsulting.com.br

    <Proxy *>
        Require all granted
    </Proxy>

    ProxyPreserveHost On

    # Redirecionamento e otimização para o MCP Server (Server-Sent Events)
    <Location "/mcp/">
        ProxyPass http://127.0.0.1:8000/
        ProxyPassReverse http://127.0.0.1:8000/
        
        # Desativa compressão e buffering do fluxo
        SetEnv no-gzip 1
        SetEnv dont-vary 1
        
        # Garante cabeçalhos para manter a conexão aberta e fluida
        Header set Connection "keep-alive"
        Header set Content-Type "text/event-stream"
        Header set Cache-Control "no-cache"
    </Location>

    ProxyPass /_stcore/stream ws://127.0.0.1:8501/_stcore/stream
    ProxyPassReverse /_stcore/stream ws://127.0.0.1:8501/_stcore/stream

    ProxyPass / http://127.0.0.1:8501/
    ProxyPassReverse / http://127.0.0.1:8501/
    
    ErrorLog ${APACHE_LOG_DIR}/comigo-error.log
    CustomLog ${APACHE_LOG_DIR}/comigo-access.log combined

SSLCertificateFile /etc/letsencrypt/live/comigo.vectorconsulting.com.br/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/comigo.vectorconsulting.com.br/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
