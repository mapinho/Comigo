version: '3.8'

services:
  comigo:
    image: python:3.11-slim
    container_name: comigo_app
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run app.py \
             --server.port=8501 \
             --server.address=0.0.0.0 \
             --server.enableCORS=false \
             --server.enableXSRF=false"
    environment:
      - TZ=America/Sao_Paulo

  mcp:
    image: python:3.11-slim
    container_name: comigo_mcp
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             mcp run mcp_server.py --transport sse --host 0.0.0.0 --port 8000"
    environment:
      - TZ=America/Sao_Paulo
